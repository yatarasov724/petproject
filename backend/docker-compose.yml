services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                          # copy .env.example → .env and fill in secrets
    environment:
      DATABASE_URL: sqlite:////data/moex_assistant.db
      LOG_FORMAT: json
    volumes:
      - ./data:/data                  # SQLite database — persists across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
